# DHCP and DNS for GoodWifi clients.
port=53
interface=wlan0
bind-dynamic
dhcp-authoritative
dhcp-range=10.42.0.10,10.42.0.100,255.255.255.0,24h
dhcp-option=3,10.42.0.1
dhcp-option=6,10.42.0.1
domain-needed
bogus-priv
no-resolv
server=127.0.0.1#5353
cache-size=1000
log-dhcp
ipset=/.github.com/.githubusercontent.com/.actions.githubusercontent.com/vpn_domains
